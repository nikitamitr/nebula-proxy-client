NEBULA_LISTEN_PORT=4243 # Separate port from your main 4242 network

# Architecture override (leave empty to auto-detect)
ARCH=amd64

# --------------------------------------------------------
# ROLE & SECURE FIREWALL SETTINGS
# --------------------------------------------------------
# Choose: "scraper", "proxy", "proxy+ssh", "open", or "open+ssh"
#   scraper    - Locked-down inbound (no open ports)
#   proxy      - Port 1080 (SOCKS) restricted to MASTER_SCRAPER_NEBULA_IP
#   proxy+ssh  - Port 1080 + port 22 (SSH) + install SSH key
#   open       - All ports open inbound
#   open+ssh   - All ports open + install SSH key
NODE_TYPE=scraper

# IF NODE_TYPE=proxy, specify the Scraper IP block allowed to connect to Dante:
MASTER_SCRAPER_NEBULA_IP=10.100.1.0/24

